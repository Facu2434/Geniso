<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recursos de clase</title>

<style>
:root {
  --bg: #e2e8f0;
  --card: #ffffff;
  --dark: #1e293b;
  --accent: #1d4ed8;
  --text: #334155;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: system-ui, sans-serif;
  background: var(--bg);
  padding:40px;
}

h1 {
  text-align:center;
  margin-bottom:40px;
  color: var(--dark);
}

.section {
  max-width:1000px;
  margin:0 auto 40px;
}

.section h2 {
  margin-bottom:20px;
  color: var(--dark);
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  padding: 25px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  border-color: var(--accent);
  transform: translateY(-5px);
}

.card h3 {
  margin-bottom:10px;
  color: var(--dark);
}

.card p {
  font-size: 0.95rem;
  color: var(--text);
}
</style>
</head>

<body>

<h1>Comunicación, cultura y sociedad</h1>

<div class="section">
  <h2>Clase 15/04 — Introducción al CV</h2>
  <div class="grid">
    <div class="card" onclick="go('cv.html')">
      <h3>CV interactivo</h3>
      <p>Explicación general</p>
    </div>

    <div class="card" onclick="go('comparacion.html')">
      <h3>Bueno vs Malo</h3>
      <p>Qué funciona y qué no</p>
    </div>

    <div class="card" onclick="go('guia.html')">
      <h3>Guía</h3>
      <p>Resumen completo</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Clase 22/04 — CV en Canva</h2>
  <div class="grid">
    <div class="card" onclick="go('canva2.html')">
      <h3>Clase interactiva</h3>
      <p>Repaso + Canva</p>
    </div>
  </div>
</div>

<script>
function go(url){
  window.location.href = url;
}
</script>

</body>
</html>
