<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clase: CV</title>

<style>
:root {
  --bg: #e2e8f0;
  --card: #ffffff;
  --dark: #1e293b;
  --accent: #1d4ed8;
  --text: #334155;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: system-ui, sans-serif;
  background: var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container {
  width: 100%;
  max-width: 900px;
  background: var(--card);
  border-radius: 16px;
  padding: 60px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.2);
  text-align:center;
}

h1 {
  font-size: 2.8rem;
  color: var(--dark);
  margin-bottom: 10px;
}

p {
  color: var(--text);
  margin-bottom: 40px;
  font-size: 1.2rem;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.card {
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  padding: 30px 20px;
  cursor: pointer;
  transition: all 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.card h2 {
  font-size: 1.3rem;
  color: var(--dark);
  margin-bottom: 10px;
}

.card p {
  font-size: 1rem;
}

</style>
</head>

<body>

<div class="container">
  <h1>Armado de CV</h1>
  <p>Elegí qué parte querés ver</p>

  <div class="grid">

    <div class="card" onclick="go('cv.html')">
      <h2>CV interactivo</h2>
      <p>Explicación general del CV</p>
    </div>

    <div class="card" onclick="go('comparacion.html')">
      <h2>CV bueno vs malo</h2>
      <p>Qué funciona y qué no</p>
    </div>

    <div class="card" onclick="go('guia.html')">
      <h2>Guía rápida</h2>
      <p>Resumen para estudiar</p>
    </div>

  </div>
</div>

<script>
function go(url){
  window.location.href = url;
}
</script>

</body>
</html>
